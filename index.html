<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow">
  <title>거인영어 수강신청</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>거인영어 수강신청</h1>
      <div class="subtitle" id="modeIndicator">신청을 원하는 시간을 클릭하세요</div>
    </div>

    <!-- 정정 모드 배너 -->
    <div class="edit-mode-banner" id="editModeBanner" style="display:none;">
      <h3>⚠️ 수강정정 모드</h3>
      <p>본인이 신청한 수업을 클릭해서 취소하고, 빈 시간을 클릭해서 다시 신청하세요.<br>
         <strong>취소 횟수 = 신청 횟수</strong>가 같아야 변경할 수 있습니다.</p>
      <div class="edit-mode-status">
        <div>취소: <span class="count" id="cancelCount">0</span>건</div>
        <div>신청: <span class="count" id="newCount">0</span>건</div>
      </div>
      <button class="confirm-edit-btn" id="confirmEditBtn" disabled>변경 확정</button>
    </div>

    <!-- 신청자 색상 범례 -->
    <div class="student-legend" id="studentLegend" style="display:none;">
      <h4>📌 신청자별 색상</h4>
      <div class="legend-items" id="legendItems"></div>
    </div>

    <!-- 월 네비게이션 -->
    <div class="month-nav">
      <button id="prevMonth">◀ 이전달</button>
      <div class="month-title" id="monthTitle">로딩 중...</div>
      <button id="nextMonth">다음달 ▶</button>
    </div>

    <!-- 달력 -->
    <div class="calendar">
      <div class="calendar-header">
        <div class="day-name sunday">일요일</div>
        <div class="day-name">월요일</div>
        <div class="day-name">화요일</div>
        <div class="day-name">수요일</div>
        <div class="day-name">목요일</div>
        <div class="day-name">금요일</div>
        <div class="day-name saturday">토요일</div>
      </div>
      <div class="calendar-grid" id="calendarGrid">
        <div class="loading">달력을 불러오는 중...</div>
      </div>
    </div>
  </div>

  <!-- 신청 모달 -->
  <div class="modal-overlay" id="signupModal">
    <div class="modal">
      <h2>수강 신청</h2>
      <p id="signupTime"></p>
      <div class="warning">
        ⚠️ 한번 신청한 수업은 <strong>취소할 수 없습니다</strong>.<br>
        신중히 결정해주세요.
      </div>
      <div class="input-group">
        <label>본인 성명</label>
        <input type="text" id="studentName" placeholder="실명을 입력하세요" maxlength="20">
      </div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="cancelSignup">취소</button>
        <button class="btn btn-primary" id="confirmSignup">신청하기</button>
      </div>
    </div>
  </div>

  <!-- 정정 모드 - 본인 확인 모달 -->
  <div class="modal-overlay" id="editNameModal">
    <div class="modal">
      <h2>정정 신청자 확인</h2>
      <p>정정하실 본인 성명을 입력해주세요.<br>
         <small style="color:#666;">(신청 시 사용한 이름과 동일해야 합니다)</small></p>
      <div class="input-group">
        <input type="text" id="editStudentName" placeholder="본인 성명" maxlength="20">
      </div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="cancelEditName">취소</button>
        <button class="btn btn-primary" id="confirmEditName">확인</button>
      </div>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { nameToColor, getKSTNow, dateKey, monthKey, formatTime } from './utils.js';
    import {
      collection, doc, getDoc, getDocs, setDoc, deleteDoc, updateDoc,
      onSnapshot, runTransaction
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    let currentDate = new Date();
    let monthData = {};
    let settings = { editMode: false, signupOpen: null };
    let editModeData = { toCancel: [], toBook: [], studentName: null };
    let pendingSlot = null;

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show ' + type;
      setTimeout(() => { toast.className = 'toast'; }, 3000);
    }

    async function loadSettings() {
      const settingsRef = doc(db, 'settings', 'main');
      onSnapshot(settingsRef, (docSnap) => {
        if (docSnap.exists()) {
          settings = docSnap.data();
        } else {
          settings = { editMode: false, signupOpen: null };
        }
        updateModeUI();
        renderCalendar();
      });
    }

    function updateModeUI() {
      const banner = document.getElementById('editModeBanner');
      const indicator = document.getElementById('modeIndicator');

      if (settings.editMode) {
        banner.style.display = 'block';
        indicator.textContent = '⚠️ 수강정정 모드입니다.';
        if (!editModeData.studentName) {
          // 정정 모드 진입 시 이름 확인 필요
          setTimeout(() => askEditName(), 300);
        }
      } else {
        banner.style.display = 'none';
        indicator.textContent = '신청을 원하는 시간을 클릭하세요';
        editModeData = { toCancel: [], toBook: [], studentName: null };
      }
      updateEditModeStatus();
    }

    function askEditName() {
      document.getElementById('editStudentName').value = '';
      document.getElementById('editNameModal').classList.add('active');
      setTimeout(() => document.getElementById('editStudentName').focus(), 100);
    }

    document.getElementById('cancelEditName').onclick = () => {
      document.getElementById('editNameModal').classList.remove('active');
    };

    document.getElementById('confirmEditName').onclick = () => {
      const name = document.getElementById('editStudentName').value.trim();
      if (!name) {
        showToast('이름을 입력해주세요', 'error');
        return;
      }
      editModeData.studentName = name;
      document.getElementById('editNameModal').classList.remove('active');
      showToast(`${name}님으로 정정 모드 진입`, 'success');
      renderCalendar();
    };

    function updateEditModeStatus() {
      document.getElementById('cancelCount').textContent = editModeData.toCancel.length;
      document.getElementById('newCount').textContent = editModeData.toBook.length;
      const btn = document.getElementById('confirmEditBtn');
      btn.disabled = !(editModeData.toCancel.length > 0 &&
                       editModeData.toCancel.length === editModeData.toBook.length);
    }

    function isSignupOpen() {
      if (!settings.signupOpen || !settings.signupOpen.enabled) return true;
      const now = getKSTNow();
      const start = new Date(settings.signupOpen.start);
      const end = new Date(settings.signupOpen.end);
      return now >= start && now <= end;
    }

    let unsubscribeMonth = null;
    function loadMonthData(year, month) {
      if (unsubscribeMonth) unsubscribeMonth();
      const mKey = monthKey(year, month);
      const daysRef = collection(db, 'months', mKey, 'days');

      unsubscribeMonth = onSnapshot(daysRef, (snapshot) => {
        monthData = {};
        snapshot.forEach(docSnap => {
          monthData[docSnap.id] = docSnap.data();
        });
        renderCalendar();
        renderLegend();
      });
    }

    // 신청자 색상 범례 그리기
    function renderLegend() {
      const names = new Set();
      Object.values(monthData).forEach(day => {
        if (day.slots) {
          day.slots.forEach(slot => {
            if (slot.bookedBy) names.add(slot.bookedBy);
          });
        }
      });

      const legendEl = document.getElementById('studentLegend');
      const itemsEl = document.getElementById('legendItems');

      if (names.size === 0) {
        legendEl.style.display = 'none';
        return;
      }

      legendEl.style.display = 'block';
      itemsEl.innerHTML = '';
      Array.from(names).sort().forEach(name => {
        const c = nameToColor(name);
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.style.background = c.bg;
        item.style.color = c.fg;
        item.style.border = `1px solid ${c.border}`;
        item.textContent = name;
        itemsEl.appendChild(item);
      });
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('monthTitle').textContent = `${year}년 ${String(month + 1).padStart(2, '0')}월`;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDayOfWeek = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      const prevLastDay = new Date(year, month, 0).getDate();

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      let cells = [];

      for (let i = startDayOfWeek - 1; i >= 0; i--) {
        cells.push({
          day: prevLastDay - i,
          otherMonth: true,
          dayOfWeek: (startDayOfWeek - 1 - i + 7) % 7
        });
      }

      for (let day = 1; day <= daysInMonth; day++) {
        cells.push({
          day,
          otherMonth: false,
          dayOfWeek: new Date(year, month, day).getDay(),
          fullDate: dateKey(year, month, day)
        });
      }

      const totalCells = Math.ceil(cells.length / 7) * 7;
      let nextDay = 1;
      while (cells.length < totalCells) {
        cells.push({
          day: nextDay++,
          otherMonth: true,
          dayOfWeek: cells.length % 7
        });
      }

      cells.forEach(cell => {
        const cellDiv = document.createElement('div');
        cellDiv.className = 'day-cell';
        if (cell.otherMonth) cellDiv.classList.add('other-month');
        if (cell.dayOfWeek === 0) cellDiv.classList.add('sunday');
        if (cell.dayOfWeek === 6) cellDiv.classList.add('saturday');

        const dayNum = document.createElement('div');
        dayNum.className = 'day-number';
        dayNum.textContent = cell.day;
        cellDiv.appendChild(dayNum);

        if (!cell.otherMonth && cell.fullDate) {
          const dayData = monthData[cell.fullDate];
          if (dayData) {
            if (dayData.isHoliday) {
              cellDiv.classList.add('holiday');
              const label = document.createElement('div');
              label.className = 'holiday-label';
              label.textContent = 'ALL OFF';
              cellDiv.appendChild(label);
              if (dayData.holidayLabel) {
                const sub = document.createElement('div');
                sub.className = 'holiday-sub';
                sub.textContent = `(${dayData.holidayLabel})`;
                cellDiv.appendChild(sub);
              }
            } else if (dayData.slots) {
              dayData.slots.forEach(slot => {
                const slotEl = createSlotElement(cell.fullDate, slot);
                cellDiv.appendChild(slotEl);
              });
            }
          }
        }

        grid.appendChild(cellDiv);
      });
    }

    function createSlotElement(date, slot) {
      const el = document.createElement('div');
      el.className = 'time-slot';
      const timeDisplay = formatTime(slot.time);
      el.textContent = timeDisplay;

      const slotId = `${date}_${slot.time}`;
      const isBooked = !!slot.bookedBy;
      const isOpen = isSignupOpen();

      // 예약된 슬롯에 색상 적용
      if (isBooked) {
        const c = nameToColor(slot.bookedBy);
        el.style.background = c.bg;
        el.style.color = c.fg;
        el.style.borderColor = c.border;
        el.textContent = `${timeDisplay} ${slot.bookedBy}`;
      }

      if (settings.editMode) {
        if (isBooked) {
          // 본인 예약인 경우만 취소 가능
          if (slot.bookedBy === editModeData.studentName) {
            el.style.cursor = 'pointer';
            if (editModeData.toCancel.find(s => s.id === slotId)) {
              el.classList.add('to-cancel');
              el.textContent = `${timeDisplay} 취소예정`;
            }
            el.addEventListener('click', () => toggleCancelInEditMode(date, slot));
          } else {
            // 다른 사람 예약은 클릭 불가
            el.classList.add('booked');
          }
        } else {
          // 빈 슬롯 = 신청 가능
          if (editModeData.toBook.find(s => s.id === slotId)) {
            el.classList.add('selected');
            el.textContent = `${timeDisplay} 신청예정`;
          }
          el.addEventListener('click', () => toggleBookInEditMode(date, slot));
        }
      } else {
        // 일반 모드
        if (isBooked) {
          el.classList.add('booked');
        } else if (!isOpen) {
          el.classList.add('disabled');
          el.title = '신청 가능 시간이 아닙니다';
        } else {
          el.addEventListener('click', () => openSignupModal(date, slot));
        }
      }

      return el;
    }

    function openSignupModal(date, slot) {
      pendingSlot = { date, slot };
      document.getElementById('signupTime').textContent =
        `${date} ${formatTime(slot.time)}`;
      document.getElementById('studentName').value = '';
      document.getElementById('signupModal').classList.add('active');
      setTimeout(() => document.getElementById('studentName').focus(), 100);
    }

    document.getElementById('cancelSignup').onclick = () => {
      document.getElementById('signupModal').classList.remove('active');
    };

    document.getElementById('confirmSignup').onclick = async () => {
      const name = document.getElementById('studentName').value.trim();
      if (!name) {
        showToast('이름을 입력해주세요', 'error');
        return;
      }

      // 최종 확인
      if (!confirm(`${name}님, ${pendingSlot.date} ${formatTime(pendingSlot.slot.time)}에 신청하시겠습니까?\n\n⚠️ 한번 신청하면 취소할 수 없습니다.`)) {
        return;
      }

      const btn = document.getElementById('confirmSignup');
      btn.disabled = true;
      btn.textContent = '신청 중...';

      try {
        await bookSlot(pendingSlot.date, pendingSlot.slot.time, name);
        document.getElementById('signupModal').classList.remove('active');
        showToast(`✅ ${name}님 신청 완료!`, 'success');
      } catch (err) {
        showToast('❌ ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '신청하기';
      }
    };

    async function bookSlot(date, time, name) {
      const mKey = date.substring(0, 7);
      const dayRef = doc(db, 'months', mKey, 'days', date);

      await runTransaction(db, async (transaction) => {
        const daySnap = await transaction.get(dayRef);
        if (!daySnap.exists()) throw new Error('해당 날짜를 찾을 수 없습니다');

        const data = daySnap.data();
        if (data.isHoliday) throw new Error('휴일에는 신청할 수 없습니다');

        // 신청 오픈 시간 재확인 (서버에서 한번 더)
        if (!isSignupOpen()) throw new Error('신청 가능 시간이 아닙니다');

        const slots = data.slots || [];
        const slotIdx = slots.findIndex(s => s.time === time);
        if (slotIdx === -1) throw new Error('해당 시간을 찾을 수 없습니다');

        if (slots[slotIdx].bookedBy) {
          throw new Error('이미 신청된 시간입니다');
        }

        slots[slotIdx] = {
          ...slots[slotIdx],
          bookedBy: name,
          bookedAt: new Date().toISOString()
        };

        transaction.update(dayRef, { slots });
      });
    }

    function toggleCancelInEditMode(date, slot) {
      const slotId = `${date}_${slot.time}`;
      const idx = editModeData.toCancel.findIndex(s => s.id === slotId);
      if (idx >= 0) {
        editModeData.toCancel.splice(idx, 1);
      } else {
        editModeData.toCancel.push({
          id: slotId, date, time: slot.time, name: slot.bookedBy
        });
      }
      renderCalendar();
      updateEditModeStatus();
    }

    function toggleBookInEditMode(date, slot) {
      const slotId = `${date}_${slot.time}`;
      const idx = editModeData.toBook.findIndex(s => s.id === slotId);
      if (idx >= 0) {
        editModeData.toBook.splice(idx, 1);
      } else {
        editModeData.toBook.push({
          id: slotId, date, time: slot.time, name: editModeData.studentName
        });
      }
      renderCalendar();
      updateEditModeStatus();
    }

    document.getElementById('confirmEditBtn').onclick = async () => {
      if (editModeData.toCancel.length !== editModeData.toBook.length) return;
      if (editModeData.toCancel.length === 0) return;

      const confirmMsg = `${editModeData.studentName}님의 변경을 확정하시겠습니까?\n\n` +
        `취소: ${editModeData.toCancel.length}건\n` +
        `신청: ${editModeData.toBook.length}건\n\n` +
        `확정 후 되돌릴 수 없습니다.`;
      if (!confirm(confirmMsg)) return;

      const btn = document.getElementById('confirmEditBtn');
      btn.disabled = true;
      btn.textContent = '처리 중...';

      try {
        for (const item of editModeData.toCancel) {
          await cancelSlot(item.date, item.time, editModeData.studentName);
        }
        for (const item of editModeData.toBook) {
          await bookSlot(item.date, item.time, item.name);
        }
        editModeData.toCancel = [];
        editModeData.toBook = [];
        renderCalendar();
        updateEditModeStatus();
        showToast('✅ 변경 완료!', 'success');
      } catch (err) {
        showToast('❌ ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '변경 확정';
      }
    };

    async function cancelSlot(date, time, expectedName) {
      const mKey = date.substring(0, 7);
      const dayRef = doc(db, 'months', mKey, 'days', date);

      await runTransaction(db, async (transaction) => {
        const daySnap = await transaction.get(dayRef);
        if (!daySnap.exists()) return;

        const data = daySnap.data();
        const slots = data.slots || [];
        const slotIdx = slots.findIndex(s => s.time === time);
        if (slotIdx === -1) return;

        // 본인 예약인지 확인
        if (slots[slotIdx].bookedBy !== expectedName) {
          throw new Error(`${date} ${time}은 ${expectedName}님의 신청이 아닙니다`);
        }

        slots[slotIdx] = { time: slots[slotIdx].time };
        transaction.update(dayRef, { slots });
      });
    }

    document.getElementById('prevMonth').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      loadMonthData(currentDate.getFullYear(), currentDate.getMonth());
      if (settings.editMode) {
        editModeData.toCancel = [];
        editModeData.toBook = [];
        updateEditModeStatus();
      }
    };

    document.getElementById('nextMonth').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      loadMonthData(currentDate.getFullYear(), currentDate.getMonth());
      if (settings.editMode) {
        editModeData.toCancel = [];
        editModeData.toBook = [];
        updateEditModeStatus();
      }
    };

    // Enter 키 처리
    document.getElementById('studentName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('confirmSignup').click();
    });
    document.getElementById('editStudentName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('confirmEditName').click();
    });

    loadSettings();
    loadMonthData(currentDate.getFullYear(), currentDate.getMonth());
  </script>
</body>
</html>
